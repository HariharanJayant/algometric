<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}AlgoMetrics Quantum Terminal{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        /* UNIVERSAL MODERN INTERFACE TYPOGRAPHY OVERRIDE */
        html, body, div, span, h1, h2, h3, h4, h5, h6, p, a, button, input, select, table, th, td, label, span.badge {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif !important;
            letter-spacing: -0.015em;
        }

        body { 
            background-color: #090d16 !important; 
            color: #ffffff; 
            overflow-x: hidden !important;
            margin: 0;
            padding: 0;
        }

        /* CARD HOVER MICRO-INTERACTIONS */
        .glass-card { 
            background: #111827 !important; 
            border: 1px solid #1f2937 !important; 
            border-radius: 6px; 
            padding: 24px; 
            margin-bottom: 24px; 
            position: relative;
            overflow: hidden !important; 
            transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        }
        .glass-card:hover {
            transform: translateY(-2px);
            border-color: #374151 !important;
            box-shadow: 0 12px 24px -10px rgba(0, 0, 0, 0.8);
        }
        
        .chart-container { 
            position: relative; 
            height: 480px; 
            width: 100%; 
            border-radius: 4px; 
            overflow: hidden !important; 
            border: 1px solid #1f2937; 
            background-color: #111827 !important;
        }

        .row, .col-md-2, .col-md-10, .col-lg-4, .col-lg-8, .col-xl-8, .col-xl-4 {
            overflow: hidden !important;
        }

        /* CORE COMPONENT STYLING */
        .navbar-brand { font-weight: 800; letter-spacing: -0.5px; }
        .metric-value { font-size: 1.8rem; font-weight: 700; }
        .text-neon-blue { color: #38bdf8; }
        .text-neon-green { color: #4ade80; }
        .text-neon-red { color: #f87171; }
        .text-neon-cyan { color: #22d3ee; }
        .metric-label { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; color: #9ca3af; margin-bottom: 6px; }
        .terminal-header { border-left: 3px solid #3b82f6; padding-left: 12px; font-weight: 700; color: #ffffff; }
        .form-control { background-color: #1f2937; border-color: #374151; color: #ffffff; border-radius: 4px; }
        .form-control:focus { background-color: #111827; border-color: #3b82f6; color: #ffffff; box-shadow: none; }
        .nested-dark-well { background-color: #1f2937; border: 1px solid #374151; border-radius: 4px; }
        .list-group-item-dark-custom { background-color: #111827; color: #ffffff; border: 1px solid #1f2937; }
        .list-group-item-dark-custom:hover { background-color: #1f2937; color: #38bdf8; }
        .text-bright-silver { color: #e2e8f0 !important; }

        /* SIDEBAR WITH INDICATOR RAILS */
        .sidebar-menu {
            background-color: #000000;
            border-right: 1px solid #1f2937;
            min-height: 100vh;
            padding: 20px 0;
        }
        .nav-link-custom {
            color: #9ca3af;
            font-weight: 500;
            font-size: 0.9rem;
            padding: 14px 24px;
            display: block;
            text-decoration: none;
            border-left: 3px solid transparent;
            transition: color 0.15s ease, background-color 0.15s ease;
        }
        .nav-link-custom:hover { 
            background: #111827; 
            color: #38bdf8; 
        }
        .nav-link-custom.active { 
            background: #111827; 
            color: #ffffff; 
            border-left: 3px solid #3b82f6;
            font-weight: 700;
        }

        /* LIVE PULSE HEARTBEAT */
        @keyframes pulse {
            0% { opacity: 0.3; transform: scale(0.95); box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.4); }
            50% { opacity: 1; transform: scale(1); box-shadow: 0 0 8px 2px rgba(74, 222, 128, 0.6); }
            100% { opacity: 0.3; transform: scale(0.95); box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.4); }
        }
        .heartbeat-dot {
            width: 8px;
            height: 8px;
            background-color: #4ade80;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
            vertical-align: middle;
            animation: pulse 2.5s infinite ease-in-out;
        }
    </style>
</head>
<body>

<div class="container-fluid p-0">
    <div class="row g-0">
        <div class="col-md-2 sidebar-menu">
            <div class="px-4 mb-4">
                <span class="navbar-brand h1 text-primary d-block fw-extrabold mb-0" style="font-size: 1.3rem;">Algometrics</span>
                <span class="text-muted small fw-bold" style="font-size: 0.7rem; letter-spacing: 0.05em;">SYSTEM COMPILER v3.0</span>
            </div>
            <hr style="border-color: #1f2937; margin: 0 0 15px 0;">
            <nav>
                <a href="/" class="nav-link-custom {% if active_page == 'home' %}active{% endif %}">Real-Time Scanner</a>
                <a href="/portfolio" class="nav-link-custom {% if active_page == 'portfolio' %}active{% endif %}">Backtest Analytics</a>
            </nav>
        </div>

        <div class="col-md-10" style="min-height: 100vh; background-color: #090d16;">
            <nav class="navbar navbar-dark bg-black mb-4 px-4" style="border-bottom: 1px solid #1f2937; height: 65px;">
                <div class="d-flex align-items-center">
                    <span class="heartbeat-dot"></span>
                    <span class="navbar-brand mb-0 h1 text-white text-uppercase" style="font-size: 0.75rem; letter-spacing: 0.05em;">Terminal Matrix Frame</span>
                </div>
                <span class="badge bg-transparent text-neon-cyan border border-info text-uppercase" style="font-size: 0.65rem; padding: 6px 12px; letter-spacing: 0.05em; background-color: #111827 !important;">
    🖥️ Core Engine: Operational
                </span>
            </nav>
            <div class="px-4 pb-4">
                {% block content %}{% endblock %}
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
